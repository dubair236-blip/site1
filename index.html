<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xalyava Stars Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Загрузочный экран -->
    <div id="loading-screen">
        <div class="duck-container">
            <div class="duck">🦆</div>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
            <p style="color: white; margin-top: 10px;">Загрузка игр...</p>
        </div>
    </div>

    <!-- Главное меню -->
    <div id="main-menu" style="display: none;">
        <div class="header">
            <h1>🎮 Xalyava Games</h1>
            <div id="user-info">
                <span id="username">Игрок</span>
                <span id="balance">⭐ 0</span>
            </div>
        </div>

        <div id="content-area" style="padding: 15px; padding-bottom: 80px;"></div>

        <nav class="bottom-nav">
            <button class="nav-btn active" onclick="showTab('games')">
                🎮<br>Игры
            </button>
            <button class="nav-btn" onclick="showTab('leaderboard')">
                🏆<br>Рейтинг
            </button>
            <button class="nav-btn" onclick="showTab('instructions')">
                📖<br>Инструкция
            </button>
            <button class="nav-btn" onclick="showTab('profile')">
                👤<br>Профиль
            </button>
        </nav>
    </div>

    <!-- Модальное окно -->
    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
    <script src="games/tictactoe.js"></script>
    <script src="games/dice.js"></script>
    <script src="games/cups.js"></script>
</body>
</html>
